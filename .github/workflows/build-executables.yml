name: Build executables with Nuitka

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            output_name: CalculadoraCoisas.bin
          - os: windows-latest
            output_name: CalculadoraCoisas.exe
          - os: macos-latest
            output_name: CalculadoraCoisas.app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nuitka==4.1 ordered-set zstandard

      - name: Install runtime dependencies
        run: |
          pip install requests tkcalendar python-dateutil

      - name: Install Linux build tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3-tk

      - name: Install Windows build tools
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Install macOS build tools
        if: runner.os == 'macOS'
        run: |
          xcode-select --install 2>/dev/null || true

      - name: Build executable (Linux)
        if: runner.os == 'Linux'
        run: |
          python -m nuitka \
            --onefile \
            --enable-plugin=tk-inter \
            --include-data-files=images/favicon.png=images/ \
            --company-name=JGabrielJ \
            --product-name="Calculadora de Coisas" \
            --product-version=1.1 \
            --file-description="Retro multifunctional calculator with a simple and intuitive interface" \
            --output-filename=ThingCalculator_v1.1_linux_x64 \
            --output-dir=dist \
            --remove-output \
            main.py

      - name: Build executable (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m nuitka --onefile --enable-plugin=tk-inter --include-data-files=images\favicon.png=images\ --windows-console-mode=disable --windows-icon-from-ico=images\favicon.ico --company-name=JGabrielJ --product-name="Calculadora de Coisas" --product-version=1.1 --file-description="Retro multifunctional calculator with a simple and intuitive interface" --output-filename=ThingCalculator_v1.1_windows_x64 --output-dir=dist --remove-output main.py
        env:
          NUITKA_ASSUME_YES_FOR_DOWNLOADS: 1

      - name: Build executable (macOS)
        if: runner.os == 'macOS'
        run: |
          python -m nuitka \
            --onefile \
            --enable-plugin=tk-inter \
            --include-data-files=images/favicon.png=images/ \
            --company-name=JGabrielJ \
            --product-name="Calculadora de Coisas" \
            --product-version=1.1 \
            --file-description="Retro multifunctional calculator with a simple and intuitive interface" \
            --output-filename=ThingCalculator_v1.1_macos_x64 \
            --output-dir=dist \
            --remove-output \
            main.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: CalculadoraCoisas-${{ runner.os }}
          path: dist/ThingCalculator_v1.1_*
          retention-days: 30
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          draft: false
          prerelease: false
          tag_name: ${{ github.ref_name }}
          name: "Calculadora de Coisas v${{ github.ref_name }}"
          body: |
            🔧 Correção de falhas na nova versão da Calculadora de Coisas (v${{ github.ref_name }})

            <br />

            Melhorias:
            - Suporte completo ao macOS x64 (consulte o README para instruções de execução)
            - Cálculo de funções trigonométricas imediatas agora roda em ambiente seguro, prevenindo execução de malware
            - Arquivos `.bat` (Windows) e `.sh` (Linux/macOS) reformulados para melhor usabilidade e compatibilidade

            Correções:
            - Resolução automática de expressões com operadores finais (ex: "1+2+" calcula como "1+2")
            - Correção de bug no conversor que impedia dígitos após "∞"
            - Refatoração e organização do código para Clean Code (funções utilitárias centralizadas em `utils.py`)
            - Otimizações no workflow de build com metadados completos

            Downloads (não requer Python instalado):
            - Windows: *ThingCalculator_v1.1_windows_x64.exe*
            - Linux: *ThingCalculator_v1.1_linux_x64* (rode `chmod +x` antes de executar)
            - macOS: *ThingCalculator_v1.1_macos_x64* (consulte o README para permissões)

            > Report bugs via GitHub Issues

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
